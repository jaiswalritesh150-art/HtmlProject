<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Us Page</title>
  <style>
    :root {
      --bg-light: #ffffff;
      --text-light: #222222;
      --bg-dark: #121212;
      --text-dark: #f5f5f5;
      --accent: #4a90e2;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: var(--bg-light);
      color: var(--text-light);
      transition: background-color 0.3s, color 0.3s;
    }

    body.dark-mode {
      background-color: var(--bg-dark);
      color: var(--text-dark);
    }

    header {
      padding: 3rem;
      text-align: center;
      background: var(--accent);
      color: #fff;
    }

    section {
      padding: 2rem;
      text-align: center;
    }

    .testimonials {
      background: rgba(74, 144, 226, 0.1);
      border-radius: 8px;
      margin: 2rem;
      padding: 2rem;
    }

    footer {
      padding: 1rem;
      text-align: center;
      background: var(--accent);
      color: #fff;
    }

    .toggle-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <button class="toggle-btn" onclick="toggleMode()">Toggle Mode</button>

  <header>
    <h1>About Us</h1>
    <p>We are committed to delivering excellence and innovation.</p>
  </header>

  <section class="testimonials">
    <h2>What Our Clients Say</h2>
    <p>"Amazing service and great support!" – Client A</p>
    <p>"They truly care about customer success." – Client B</p>
  </section>

  <footer>
    <p>&copy; 2026 Your Company. All rights reserved.</p>
  </footer>

  <script>
    function toggleMode() {
      document.body.classList.toggle('dark-mode');
    }
  </script>
</body>
</html>
